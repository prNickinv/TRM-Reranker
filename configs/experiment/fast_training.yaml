# @package _global_

# Fast training experiment with torch.compile and AdamATan2
# For PyTorch 2.0+ environments

defaults:
  - override /data: msmarco
  - override /model: trm_reranker
  - override /trainer: default

# Experiment name
task_name: "fast_trm_reranker"

# Model configuration
model:
  # Use compilation for faster training
  use_compile: true
  compile_mode: reduce-overhead
  
  # Use AdamATan2 optimizer
  optimizer_name: adamatan2
  
  # Standard settings
  learning_rate: 1e-4
  H_cycles: 3
  L_cycles: 6
  N_supervision: 16

# Data configuration
data:
  batch_size: 32
  num_workers: 4

# Trainer configuration
trainer:
  max_epochs: 10
  precision: bf16-mixed
  accumulate_grad_batches: 1

# Seed for reproducibility
seed: 42
