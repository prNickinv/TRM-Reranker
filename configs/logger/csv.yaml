# CSV Logger - logs all metrics to CSV files for offline analysis
# Outputs: {save_dir}/{name}/version_{version}/metrics.csv

csv:
  _target_: lightning.pytorch.loggers.CSVLogger
  save_dir: ${output_dir}
  name: csv_logs
  version: null  # Auto-increment version number
  prefix: ""
  flush_logs_every_n_steps: 100
